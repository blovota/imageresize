<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Resizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; font-weight: 600; }
    p.sub { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
    
    .drop-zone {
      width: 100%;
      max-width: 500px;
      height: 200px;
      border: 2px dashed #333;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #1a1a1a;
      margin-bottom: 24px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #3b82f6;
      background: #111827;
    }
    .drop-zone input { display: none; }
    .drop-zone svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.5; }
    
    .controls {
      width: 100%;
      max-width: 500px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      display: none;
    }
    .controls.active { display: block; }
    
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .field {
      flex: 1;
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 6px;
    }
    input[type="number"], select {
      width: 100%;
      padding: 10px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    input[type="number"]:focus, select:focus { border-color: #3b82f6; }
    
    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
    .checkbox input { width: 16px; height: 16px; accent-color: #3b82f6; }
    
    .preview-area {
      margin-bottom: 20px;
      text-align: center;
    }
    .preview-area img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .file-info {
      font-size: 0.8rem;
      color: #666;
      margin-top: 8px;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .preset {
      padding: 6px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
    }
    .preset:hover {
      border-color: #3b82f6;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>Image Resizer</h1>
  <p class="sub">Upload a Canva export, set dimensions, download. No server, no storage.</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span>Click or drop image here</span>
  </div>

  <div class="controls" id="controls">
    <div class="preview-area">
      <img id="preview" alt="Preview">
      <div class="file-info" id="fileInfo"></div>
    </div>

    <label style="margin-bottom:8px;display:block;">Quick Presets</label>
    <div class="presets">
      <span class="preset" onclick="setSize(1080,1080)">Instagram 1:1</span>
      <span class="preset" onclick="setSize(1080,1350)">Instagram 4:5</span>
      <span class="preset" onclick="setSize(1080,1920)">Stories/Reels</span>
      <span class="preset" onclick="setSize(1200,628)">Twitter/X</span>
      <span class="preset" onclick="setSize(1920,1080)">YouTube Thumb</span>
      <span class="preset" onclick="setSize(1200,630)">Facebook</span>
    </div>

    <div class="input-group">
      <div class="field">
        <label>Width (px)</label>
        <input type="number" id="width" min="1" max="8000">
      </div>
      <div class="field">
        <label>Height (px)</label>
        <input type="number" id="height" min="1" max="8000">
      </div>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="aspectLock" checked>
      <label for="aspectLock" style="margin:0;cursor:pointer;">Lock aspect ratio</label>
    </div>

    <div class="input-group">
      <div class="field">
        <label>Format</label>
        <select id="format">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <div class="field">
        <label>Quality (JPEG/WebP)</label>
        <input type="number" id="quality" min="0.1" max="1" step="0.1" value="0.92">
      </div>
    </div>

    <button id="downloadBtn">Download Resized Image</button>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const controls = document.getElementById('controls');
    const preview = document.getElementById('preview');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const aspectLock = document.getElementById('aspectLock');
    const fileInfo = document.getElementById('fileInfo');
    
    let originalImage = null;
    let aspectRatio = 1;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return alert('Please upload an image file');
      
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImage = new Image();
        originalImage.onload = () => {
          aspectRatio = originalImage.width / originalImage.height;
          preview.src = originalImage.src;
          widthInput.value = originalImage.width;
          heightInput.value = originalImage.height;
          fileInfo.textContent = `${originalImage.width}×${originalImage.height} • ${(file.size/1024/1024).toFixed(2)} MB`;
          controls.classList.add('active');
        };
        originalImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function setSize(w, h) {
      widthInput.value = w;
      heightInput.value = h;
    }

    widthInput.addEventListener('input', () => {
      if (aspectLock.checked && originalImage) {
        heightInput.value = Math.round(widthInput.value / aspectRatio);
      }
    });

    heightInput.addEventListener('input', () => {
      if (aspectLock.checked && originalImage) {
        widthInput.value = Math.round(heightInput.value * aspectRatio);
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!originalImage) return;
      
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const w = parseInt(widthInput.value);
      const h = parseInt(heightInput.value);
      
      canvas.width = w;
      canvas.height = h;
      
      // Use better quality scaling
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(originalImage, 0, 0, w, h);
      
      const format = document.getElementById('format').value;
      const quality = parseFloat(document.getElementById('quality').value);
      const mime = format === 'image/png' ? 'image/png' : format;
      const q = format === 'image/png' ? undefined : quality;
      
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const ext = format.split('/')[1];
        a.download = `resized-${w}x${h}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
      }, mime, q);
    });
  </script>

</body>
</html>
